<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eatMate</title>
    <link href="./src/output.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="EM.png">
  </head>
  <body class="w-full box-border">
    <nav
      class="h-[85px] w-full grid lg:grid-cols-7 grid-cols-3 outline-2 items-center place-content-center"
    >
      <span class="w-fit text-4xl font-light lg:col-start-4 lg:col-end-6 col-start-2  text-center"
        >eatMate</span
      >
      <button
        id="optOut"
        class="w-fit h-fit lg:col-start-7 lg:col-end-7 p-2 m-2 outline-2 rounded hover:cursor-pointer"
      >
        Opt Out
      </button>
    </nav>
    <main class="flex flex-row flex-wrap items-center justify-center h-[80vh]">
      <div id="formCard" class="flex p-2 outline-2 w-fit m-auto rounded-3xl">
        <form class="m-15" id="myForm">
          <legend class="text-3xl p-1 mb-10 text-center">Sign up</legend>
          <fieldset>
            <label for="fname">First name:</label><br />
            <input
              class="bg-white rounded outline-1"
              type="text"
              id="fname"
              name="fname"
              required
            /><br />
            <label for="lname">Last name:</label><br />
            <input
              class="bg-white rounded outline-1"
              type="text"
              id="lname"
              name="lname"
              required
            />
            <br />
            <label for="uname">Username:</label><br />
            <input
              class="bg-white rounded outline-1"
              type="text"
              name="uname"
              id="uname"
              required
            />
            <br />
            <label for="DoB">Date of Birth</label><br />
            <input
              class="rounded outline-1"
              type="date"
              name="DoB"
              id="DoB"
              required
            /><br /><br />
            <input
              class="px-3 py-1 rounded outline-1"
              type="Submit"
              value="Opt in"
            />
          </fieldset>
        </form>
      </div>
      <div
        id="content"
        class="hidden flex-row flex-wrap items-center justify-center m-20"
      >
        <div
          id="dailyCalCard"
          class="p-4 outline-2 w-[375px] m-auto rounded-2xl h-fit mx-20"
        >
          <h3 class="m-3 text-xl">Daily Calories:</h3>
          <section class="grid grid-cols-4 m-5 w-auto items-center">
            <span class="col-span-3">Food:</span
            ><span class="col-span-1">Cals:</span>
          </section>
          <div id="foodsContainer" class="h-[23vh] outline-2 rounded-xl overflow-auto">
            <div
              id="foodsCard"
              class="grid grid-cols-4 h-16 w-auto outline-1 items-center"
            >
              <span id="foodName" class="col-span-3 m-1 border-r-1 border-black"
                >default food</span
              >
              <span id="calories" class="col-span-1 m-1">000</span>
            </div>
          </div>
          <h4 class="m-3 text-xl">Total Calories: <span id="totalCals">0</span></h4>
        </div>
        <div
          id="addFoodCard"
          class="p-4 outline-2 w-fit m-auto rounded-2xl h-fit mx-20"
        >
          <form class="m-13" id="addFood">
            <fieldset>
              <legend>Add Food</legend>
              <label for="newFood">Food Name:</label><br />
              <input
                class="bg-white rounded outline-1"
                type="text"
                id="newFood"
                name="newFood"
                required
              /><br />
              <label for="newFoodCals">Calorie count:</label><br />
              <input
                class="bg-white rounded outline-1"
                type="text"
                id="newFoodCals"
                name="newFoodCals"
                required
              /><br />
              <input
                class="m-3 px-3 py-1 rounded outline-1"
                type="Submit"
                value="Add Food"
              />
            </fieldset>
          </form>
        </div>
      </div>
    </main>
    <footer></footer>
    <script src="main.js"></script>
  </body>
</html>
