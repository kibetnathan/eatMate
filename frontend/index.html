<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eatMate</title>
    <link href="./src/output.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="EM.png" />
  </head>
  <body class="w-full box-border">
    <nav
      class="w-full flex flex-wrap items-center justify-between gap-3 px-4 sm:px-8 py-4 border-b-[3px] border-black bg-[#FFD93D]"
    >
      <div class="flex items-center gap-3">
        <span
          class="inline-block w-10 h-10 border-[3px] border-black rounded-xl bg-[#FF6B6B] shadow-[4px_4px_0_0_#000]"
          aria-hidden="true"
        ></span>
        <span class="text-3xl sm:text-4xl font-black tracking-tight">eatMate</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="brut-chip hidden sm:inline-block">track your bites</span>
        <button id="optOut" class="brut-btn brut-btn-danger">Opt Out</button>
      </div>
    </nav>

    <main
      class="w-full max-w-6xl mx-auto px-4 sm:px-8 py-8 sm:py-12 flex flex-col items-center"
    >
      <!-- Sign up card -->
      <div
        id="formCard"
        class="brut-card w-full max-w-md p-6 sm:p-8 flex flex-col"
      >
        <header class="mb-6 text-center">
          <h1 class="text-3xl sm:text-4xl font-black mb-2">Sign up</h1>
          <p class="text-sm">Get started with your daily calorie log.</p>
        </header>
        <form id="myForm" class="flex flex-col gap-4">
          <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
              <label for="fname" class="block font-bold mb-1">First name</label>
              <input class="brut-input" type="text" id="fname" name="fname" required />
            </div>
            <div class="flex-1">
              <label for="lname" class="block font-bold mb-1">Last name</label>
              <input class="brut-input" type="text" id="lname" name="lname" required />
            </div>
          </div>
          <div>
            <label for="uname" class="block font-bold mb-1">Username</label>
            <input class="brut-input" type="text" name="uname" id="uname" required />
          </div>
          <div>
            <label for="DoB" class="block font-bold mb-1">Date of birth</label>
            <input class="brut-input" type="date" name="DoB" id="DoB" required />
          </div>
          <input
            class="brut-btn brut-btn-success mt-2 w-full text-lg"
            type="submit"
            value="Opt in"
          />
        </form>
      </div>

      <!-- App content -->
      <div
        id="content"
        class="hidden w-full flex-col lg:flex-row items-stretch justify-center gap-8 lg:gap-10"
      >
        <!-- Daily calories card -->
        <section
          id="dailyCalCard"
          class="brut-card flex-1 w-full max-w-lg p-5 sm:p-6 flex flex-col"
        >
          <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
            <h3 class="text-2xl font-black">Daily Calories</h3>
            <span class="brut-chip">today</span>
          </div>
          <div
            class="grid grid-cols-[1fr_auto_auto] gap-2 px-3 pb-2 border-b-[3px] border-black font-bold text-sm uppercase tracking-wide"
          >
            <span>Food</span>
            <span class="px-2">Cals</span>
            <span class="px-2">&nbsp;</span>
          </div>
          <div
            id="foodsContainer"
            class="mt-2 border-[3px] border-black rounded-xl bg-[#FFF8E7] overflow-y-auto h-[40vh] sm:h-[45vh]"
          ></div>
          <div
            class="mt-5 flex items-center justify-between border-[3px] border-black rounded-xl bg-[#4D96FF] px-4 py-3 shadow-[4px_4px_0_0_#000]"
          >
            <span class="font-bold text-lg">Total</span>
            <span class="font-black text-2xl"
              ><span id="totalCals">0</span> cal</span
            >
          </div>
        </section>

        <!-- Add food card -->
        <section
          id="addFoodCard"
          class="brut-card flex-1 w-full max-w-md p-5 sm:p-6 self-start"
        >
          <h3 class="text-2xl font-black mb-4">Add Food</h3>
          <form id="addFood" class="flex flex-col gap-4">
            <div>
              <label for="newFood" class="block font-bold mb-1">Food name</label>
              <input
                class="brut-input"
                type="text"
                id="newFood"
                name="newFood"
                required
              />
            </div>
            <div>
              <label for="newFoodCals" class="block font-bold mb-1"
                >Calorie count</label
              >
              <input
                class="brut-input"
                type="number"
                inputmode="numeric"
                id="newFoodCals"
                name="newFoodCals"
                required
              />
            </div>
            <input
              class="brut-btn brut-btn-primary w-full text-lg mt-2"
              type="submit"
              value="Add Food"
            />
          </form>
        </section>
      </div>
    </main>

    <footer
      class="w-full text-center py-6 mt-10 border-t-[3px] border-black bg-[#6BCB77] font-bold"
    >
      built with thick lines &amp; warm colors
    </footer>

    <script src="dist/main.js"></script>
  </body>
</html>
